# nvcommd configuration for RK3588 embedded Linux

[mq]
in_name = nvcomm_in
out_name = nvcomm_out
max_messages = 256
max_message_size = 4096

[log]
dir = log
level = info
max_size_mb = 32

[runtime]
poll_interval_ms = 20
watchdog_sec = 0
cpu_affinity = -1

[data]
event_dir = data/events
persist = true
