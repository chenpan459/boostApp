# nvcommd - Linux API gateway for RK3588 (nginx upstream)

[server]
listen = 0.0.0.0
port = 8080
threads = 4
worker_threads = 4
max_body_kb = 1024
unix_socket = run/nvcomm.sock

[gateway]
api_key =
rate_limit_rps = 100

[log]
dir = log
level = info
max_size_mb = 10

[runtime]
watchdog_sec = 0
cpu_affinity = -1

[data]
event_dir = data/events
persist = true
event_max_size_mb = 50

[debug]
cli_enabled = true
cli_socket = run/nvcomm.cli.sock
