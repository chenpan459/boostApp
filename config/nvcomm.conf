# nvcommd - Linux backend service for RK3588 (nginx upstream)

[server]
listen = 0.0.0.0
port = 8080
threads = 4
worker_threads = 4
max_body_kb = 1024
unix_socket = run/nvcomm.sock

[log]
dir = log
level = info
max_size_mb = 32

[runtime]
watchdog_sec = 0
cpu_affinity = -1

[data]
event_dir = data/events
persist = true
